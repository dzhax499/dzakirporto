<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Project Detail</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
      .project-detail { padding: 100px 20px 60px; min-height: 60vh; }
      .project-detail .back { display:inline-block; margin-bottom:18px; color:#00fff2; }
      .project-detail .meta { max-width:900px; margin: 0 auto; }
      .project-detail h1{ color:#fff; margin-bottom:12px; }
      .project-detail p{ color:#ddd; line-height:1.6; }
      
      /* Markdown Styles */
      .markdown-content h1, .markdown-content h2, .markdown-content h3 { color: #fff; margin-top: 1.5em; margin-bottom: 0.5em; }
      .markdown-content h1 { font-size: 2em; border-bottom: 1px solid #292e42; padding-bottom: 0.3em; }
      .markdown-content h2 { font-size: 1.5em; border-bottom: 1px solid #292e42; padding-bottom: 0.3em; }
      .markdown-content p { margin-bottom: 1em; }
      .markdown-content a { color: #00fff2; text-decoration: none; }
      .markdown-content a:hover { text-decoration: underline; }
      .markdown-content ul, .markdown-content ol { margin-left: 20px; margin-bottom: 1em; color: #ddd; }
      .markdown-content li { margin-bottom: 0.3em; }
      .markdown-content code { background: #1a1b26; padding: 0.2em 0.4em; border-radius: 4px; font-family: monospace; color: #00fff2; font-size: 0.9em; }
      .markdown-content pre { background: #1a1b26; padding: 1em; border-radius: 8px; overflow-x: auto; margin-bottom: 1em; border: 1px solid #292e42; }
      .markdown-content pre code { background: transparent; padding: 0; color: #e2e8f0; }
      .markdown-content blockquote { border-left: 4px solid #00fff2; padding-left: 1em; color: #a9b1d6; margin-left: 0; margin-bottom: 1em; background: rgba(0, 255, 242, 0.05); padding: 10px 15px; border-radius: 4px; }
      .markdown-content img { max-width: 100%; border-radius: 8px; margin: 1em 0; }
    </style>
  </head>
  <body>
    <header>
      <div class="container">
        <h1>Dzakir Tsabit</h1>
        <nav class="nav-menu">
          <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="index.html#projects">Projects</a></li>
            <li><a href="index.html#contact">Contact</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main class="project-detail">
      <div class="container">
        <a class="back" href="index.html">Back to projects</a>
        <div class="meta">
          <img id="pd-image" src="" alt="Project image" style="width:100%;height:380px;object-fit:cover;border-radius:10px;background:#222;margin-bottom:16px;" />
          <h1 id="pd-title">Project Title</h1>
          <div style="margin-bottom:12px;">
            <a id="pd-source-btn" class="source-code-btn" href="#" target="_blank" style="display:none; text-decoration:none; padding:6px 12px; border-radius:12px; font-weight:bold; font-size:14px;">
              &lt;/&gt; View Source Code
            </a>
          </div>
          <p id="pd-desc">Project description</p>
          <div id="pd-tech" style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap;"></div>

          <section id="pd-docs" style="margin-top:22px;color:#fff;">
            <h2 id="pd-docs-title" style="margin-bottom:12px;color:#00fff2; border-bottom: 2px solid #292e42; padding-bottom: 8px;">README.md</h2>
            <div id="pd-doc-content" style="color:#ddd;">tes</div>
          </section>
        </div>
      </div>
    </main>

    <footer>
      <div class="container">
        <p>&copy; 2024 Dzakir Tsabit</p>
      </div>
    </footer>

    <script>
      const PROJECTS = {
        sudoku: {
          title: 'Permainan Sudoku Terminal',
          image: 'img/projek/sudoku/Sudoku_Thumb.png',
          desc: 'Game Sudoku adalah tugas dari DDP (Dasar Dasar Pemrograman) yang menggunakan Bahasa C. Proyek ini dijalankan melalui terminal dengan berbagai level kesulitan.',
          tech: ['C', 'CLI', 'Game Dev'],
          github_readme: 'https://raw.githubusercontent.com/dzhax499/SudokuTUBESDDP/refs/heads/main/readme.md',
          github_repo: 'https://github.com/dzhax499/SudokuTUBESDDP',
          docs: '<p>Loading documentation from GitHub...</p>'
        },
        tetris: {
          title: 'Game Tetris (C & Raylib)',
          image: 'img/projek/tetris/image.png',
          desc: 'Pengembangan ulang game klasik Tetris menggunakan bahasa pemrograman C dan framework Raylib. Proyek ini mendemonstrasikan implementasi logika game dasar, manipulasi matriks untuk grid, deteksi tabrakan (collision detection), dan rendering grafis 2D.',
          tech: ['C','Raylib','Game Dev'],
          github_readme: 'https://raw.githubusercontent.com/dzhax499/TetrisGame-C4/main/README.md',
          github_repo: 'https://github.com/dzhax499/TetrisGame-C4',
          docs: '<p>Loading documentation from GitHub...</p>'
        },
        turnbase: {
          title: 'Game Turn-Based',
          image: 'img/projek/turnbase/image.png',
          desc: 'Proyek game turn-based yang menampilkan mekanik permainan giliran, strategi, dan rendering menggunakan grafis.',
          tech: ['Java','Maven','Game Dev'],
          github_readme: 'https://raw.githubusercontent.com/dzhax499/TurnBaseGameJava/refs/heads/main/README.md',
          github_repo: 'https://github.com/dzhax499/TurnBaseGameJava',
          docs: '<p>Loading documentation from GitHub...</p>'
        },
        webapp: {
          title: 'Pengembangan Aplikasi Berbasis Website',
          image: 'img/webapp.jpg',
          desc: 'Web application using modern web technologies: responsive UI and backend functionality.',
          tech: ['HTML/CSS','JavaScript','PHP','MySQL'],
          docs: '<p>Documentation placeholder: features, deployment, API docs, database schema.</p>'
        },
        sidora: {
          title: 'SiDoRa (Sistem Dokumen Dosen)',
          image: 'img/projek/web-manajemen-dosen/sidora-web-manajemen.png',
          desc: 'Aplikasi Manajemen Dokumen Dosen (SiDoRa) yang memudahkan dosen dan Tata Usaha (TU) dalam mengelola dan memonitor dokumen resmi secara terpusat.',
          tech: ['Web Development', 'System Management'],
          github_readme: 'https://raw.githubusercontent.com/C1-Proyek3-Apk-Manajemen-Adm-Dosen/devOps/refs/heads/main/README.md',
          github_repo: 'https://github.com/dzhax499/manajemen-dok-dosen/tree/develop',
          docs: '<p>Memuat dokumentasi...</p>'
        },
        bloxantara: {
          title: 'Bloxantara Defense',
          image: 'img/projek/bloxantara/thumbnail.png',
          desc: 'Sebuah game pertahanan strategis seru yang dikembangkan di platform Roblox bernama Bloxantara Defense.',
          tech: ['Roblox Studio', 'LUA', 'Game Dev'],
          github_repo: 'https://www.roblox.com/games/73622901744147/Bloxantara-Defense',
          docs: '<p>Mainkan gamenya langsung di Roblox melalui link <a href="https://www.roblox.com/games/73622901744147/Bloxantara-Defense" target="_blank" style="color: #00fff2;">di sini</a>.</p> <br> <h3>Gameplay Video:</h3> <p><em>(Nanti kita tambahkan video gameplay di sini)</em></p>'
        }
      };

      function fallbackImage(imgEl) {
        imgEl.src = 'data:image/svg+xml;utf8,' + encodeURIComponent(
          '<svg xmlns="http://www.w3.org/2000/svg" width="800" height="480" viewBox="0 0 800 480">' +
          '<rect width="100%" height="100%" fill="#222"/>' +
          '<text x="50%" y="50%" fill="#888" font-family="Arial,Helvetica,sans-serif" font-size="24" text-anchor="middle" dominant-baseline="middle">Image Not Available</text>' +
          '</svg>'
        );
      }

      function populate() {
        const params = new URLSearchParams(location.search);
        const id = params.get('id');
        const data = PROJECTS[id];
        const img = document.getElementById('pd-image');
        const title = document.getElementById('pd-title');
        const desc = document.getElementById('pd-desc');
        const tech = document.getElementById('pd-tech');
        const docs = document.getElementById('pd-doc-content');
        const sourceBtn = document.getElementById('pd-source-btn');

        if (!data) {
          title.textContent = 'Project not found';
          desc.textContent = 'The requested project does not exist yet.';
          sourceBtn.style.display = 'none';
          fallbackImage(img);
          return;
        }

        title.textContent = data.title;
        desc.textContent = data.desc;
        img.src = data.image || '';
        img.onerror = () => fallbackImage(img);

        if (data.github_repo) {
          sourceBtn.href = data.github_repo;
          sourceBtn.style.display = 'inline-block';
        } else {
          sourceBtn.style.display = 'none';
        }

        tech.innerHTML = '';
        (data.tech || []).forEach(t => {
          const s = document.createElement('span');
          s.className = 'tech-tag';
          s.textContent = t;
          tech.appendChild(s);
        });

        docs.innerHTML = data.docs || '<p>No documentation yet.</p>';

        if (data.github_readme) {
          fetch(data.github_readme)
            .then(res => {
              if (!res.ok) throw new Error('Network response was not ok');
              return res.text();
            })
            .then(text => {
              // Parse markdown correctly using marked.js
              const html = marked.parse(text);
              docs.innerHTML = '<div class="markdown-content">' + html + '</div>';
            })
            .catch(err => {
              docs.innerHTML = '<p>Dokumentasi README belum tersedia atau repositori private.</p>';
            });
        }
      }

      populate();
    </script>
  </body>
</html>
